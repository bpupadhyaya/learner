spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/learningdb
    username: learning_user
    password: learning_password
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

security:
  jwt:
    secret: learning-super-secret-signing-key-32chars-minimum
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
