name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"

jobs:
  frontend-unit:
    name: Frontend Unit Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  frontend-integration:
    name: Frontend Integration Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  backend-unit:
    name: Backend Unit Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Run unit tests with strict unit coverage gate
        run: mvn -B -f backend/pom.xml -Dskip.integration.tests=true test

  backend-integration:
    name: Backend Integration Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Run integration tests with strict integration coverage gate
        run: mvn -B -f backend/pom.xml -Dskip.unit.tests=true verify

  container-build:
    name: Container Build Validation
    runs-on: ubuntu-latest
    needs:
      - frontend-unit
      - frontend-integration
      - backend-unit
      - backend-integration
    steps:
      - uses: actions/checkout@v4
      - name: Build all deployable services
        run: docker compose build
